name: CI

on:
  push:
    branches: [main, dev]
    paths: [crates/**, Cargo.toml, Cargo.lock, .github/workflows/ci.yml, tasks/**]
  pull_request:
    branches: [dev, main]
    paths: [crates/**, Cargo.toml, Cargo.lock, .github/workflows/ci.yml, tasks/**]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-26, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest

      - name: Unit tests
        run: cargo nextest run -p empack-lib --features test-utils -p empack-tests

      - name: Install packwiz (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L https://github.com/packwiz/packwiz/releases/latest/download/packwiz-linux-amd64 -o /usr/local/bin/packwiz
          chmod +x /usr/local/bin/packwiz

      - name: Install packwiz (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/packwiz/packwiz/releases/latest/download/packwiz-darwin-arm64 -o /usr/local/bin/packwiz
          chmod +x /usr/local/bin/packwiz

      - name: Install packwiz (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/packwiz/packwiz/releases/latest/download/packwiz-windows-amd64.exe" -OutFile "$env:USERPROFILE\.cargo\bin\packwiz.exe"

      - name: E2E tests
        run: cargo nextest run -p empack-tests -E 'test(~e2e_)'

  coverage:
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Install packwiz
        run: |
          curl -L https://github.com/packwiz/packwiz/releases/latest/download/packwiz-linux-amd64 -o /usr/local/bin/packwiz
          chmod +x /usr/local/bin/packwiz

      - run: cargo llvm-cov nextest --workspace --features test-utils --lcov --output-path lcov.info
      - run: cargo llvm-cov report --summary-only >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

  cross-check:
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cross
      - run: cross check --workspace --target aarch64-unknown-linux-gnu
